<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>식단 기록</title>
  <link rel="stylesheet" href="style.css?v=8">
</head>
<body>
  <div class="app-layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-title">🥗 식단 기록</div>

      <div class="sidebar-section">식사 시간</div>
      <ul id="folder-list"></ul>

      <div style="margin-top:auto;display:flex;flex-direction:column;gap:6px">
        <button class="add-folder-btn" onclick="openFoodListModal()">📋 전체 음식 목록</button>
        <button class="add-folder-btn bl-sidebar-btn" onclick="openBlacklistModal()">🚫 블랙리스트</button>
      </div>
    </aside>

    <!-- 메인 -->
    <div class="main">
      <header class="top-bar">
        <div class="date-nav">
          <button onclick="changeDate(-1)">‹</button>
          <span id="date-display"></span>
          <button onclick="changeDate(1)">›</button>
        </div>
        <div class="daily-summary" id="daily-summary"></div>
      </header>

      <!-- 음식 검색 추가 -->
      <div class="add-food-area">
        <div class="search-wrap">
          <input type="text" id="food-search" placeholder="음식 검색 (예: 닭가슴살, 김치...)" autocomplete="off" oninput="onSearchInput()" />
          <div id="search-dropdown" class="search-dropdown" style="display:none"></div>
        </div>
        <div id="selected-food-preview" style="display:none" class="selected-preview">
          <span id="preview-name"></span>
          <div class="preview-controls">
            <input type="number" id="food-amount" value="100" min="1" max="9999" style="width:70px" />
            <span>g</span>
            <select id="food-meal">
              <option value="아침">아침</option>
              <option value="점심">점심</option>
              <option value="저녁">저녁</option>
              <option value="간식">간식</option>
            </select>
            <button class="btn-add" onclick="addFood()">추가</button>
            <button class="btn-cancel" onclick="cancelSelect()">✕</button>
          </div>
        </div>
      </div>

      <!-- 기록 목록 -->
      <div id="food-log"></div>
    </div>
  </div>

  <!-- 영양소 상세 모달 -->
  <div id="nutrient-modal" class="modal-backdrop" style="display:none" onclick="closeNutrientModal(event)">
    <div class="modal nutrient-modal">
      <button class="modal-close" onclick="closeNutrientModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- 전체 음식 목록 모달 -->
  <div id="foodlist-modal" class="modal-backdrop" style="display:none" onclick="closeFoodListModal(event)">
    <div class="modal foodlist-modal">
      <button class="modal-close" onclick="closeFoodListModal()">✕</button>
      <h2 style="font-size:1.1rem;font-weight:700;color:#2d3748;margin-bottom:14px">📋 전체 음식 목록</h2>
      <div class="foodlist-controls">
        <input type="text" id="foodlist-search" placeholder="음식 검색..." oninput="renderFoodList()" />
        <select id="foodlist-cat" onchange="renderFoodList()">
          <option value="">전체 카테고리</option>
        </select>
      </div>
      <div id="foodlist-count" class="foodlist-count"></div>
      <div id="foodlist-body"></div>
    </div>
  </div>

  <!-- 레시피 모달 -->
  <div id="recipe-modal" class="modal-backdrop" style="display:none" onclick="closeRecipeModal(event)">
    <div class="modal recipe-modal">
      <button class="modal-close" onclick="closeRecipeModal()">✕</button>
      <div id="recipe-content"></div>
    </div>
  </div>

  <!-- 블랙리스트 모달 -->
  <div id="blacklist-modal" class="modal-backdrop" style="display:none" onclick="closeBlacklistModal(event)">
    <div class="modal foodlist-modal">
      <button class="modal-close" onclick="closeBlacklistModal()">✕</button>
      <h2 style="font-size:1.1rem;font-weight:700;color:#2d3748;margin-bottom:14px">🚫 블랙리스트</h2>
      <p style="font-size:0.82rem;color:#a0aec0;margin-top:-8px">블랙리스트에 추가된 음식은 검색에 나타나지 않습니다. 🚫 버튼을 눌러 해제하세요.</p>
      <div id="blacklist-body" style="overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:4px"></div>
    </div>
  </div>

  <script src="foods-db.js?v=11"></script>
  <script src="recipes.js?v=3"></script>
  <script src="app.js?v=12"></script>
</body>
</html>
