<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>식단 기록</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-layout">

    <!-- 사이드바 -->
    <aside class="sidebar">
      <div class="sidebar-title">🥗 식단 기록</div>

      <div class="sidebar-section">식사 시간</div>
      <ul id="folder-list"></ul>

      <div class="sidebar-section" style="margin-top:20px">폴더</div>
      <ul id="custom-folder-list"></ul>
      <button class="add-folder-btn" onclick="openFolderModal()">+ 폴더 추가</button>
    </aside>

    <!-- 메인 -->
    <div class="main">
      <header class="top-bar">
        <div class="date-nav">
          <button onclick="changeDate(-1)">‹</button>
          <span id="date-display"></span>
          <button onclick="changeDate(1)">›</button>
        </div>
        <div class="daily-summary" id="daily-summary"></div>
      </header>

      <!-- 음식 검색 추가 -->
      <div class="add-food-area">
        <div class="search-wrap">
          <input type="text" id="food-search" placeholder="음식 검색 (예: 닭가슴살, 김치...)" autocomplete="off" oninput="onSearchInput()" />
          <div id="search-dropdown" class="search-dropdown" style="display:none"></div>
        </div>
        <div id="selected-food-preview" style="display:none" class="selected-preview">
          <span id="preview-name"></span>
          <div class="preview-controls">
            <input type="number" id="food-amount" value="100" min="1" max="9999" style="width:70px" />
            <span>g</span>
            <select id="food-meal">
              <option value="아침">아침</option>
              <option value="점심">점심</option>
              <option value="저녁">저녁</option>
              <option value="간식">간식</option>
            </select>
            <select id="food-folder-sel">
              <option value="">폴더 없음</option>
            </select>
            <button class="btn-add" onclick="addFood()">추가</button>
            <button class="btn-cancel" onclick="cancelSelect()">✕</button>
          </div>
        </div>
      </div>

      <!-- 기록 목록 -->
      <div id="food-log"></div>
    </div>
  </div>

  <!-- 영양소 상세 모달 -->
  <div id="nutrient-modal" class="modal-backdrop" style="display:none" onclick="closeNutrientModal(event)">
    <div class="modal nutrient-modal">
      <button class="modal-close" onclick="closeNutrientModal()">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <!-- 폴더 생성 모달 -->
  <div id="folder-modal" class="modal-backdrop" style="display:none">
    <div class="modal small-modal">
      <h3>새 폴더</h3>
      <input type="text" id="folder-name-input" placeholder="폴더 이름" />
      <div class="modal-actions">
        <button onclick="closeFolderModal()">취소</button>
        <button class="primary" onclick="createFolder()">만들기</button>
      </div>
    </div>
  </div>

  <script src="foods-db.js"></script>
  <script src="app.js"></script>
</body>
</html>
